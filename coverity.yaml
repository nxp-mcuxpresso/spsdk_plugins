capture:
  languages:
    include: [python]
  files:
    exclude-regex: "venv"

analyze:
  aggressiveness-level: medium
  cov-analyze-args:
    [
      --security,
      --webapp-security,
      --enable-audit-checkers,
      --enable-parse-warnings,
      --enable,
      PARSE_ERROR,
    ]

commit:
  connect:
    url: https://coverity2.nxp.com:8443
    stream: spsdk_plugins_base
    on-new-cert: distrust

##############################################################
# This section is not a part of regular Coverity configuration
# Because of that Coverity will show some warnings
reports:
  project-name: "SPSDK Plugins"
  coverity-name: "SPSDK Plugins"
  types: [bd-integrity, cov-integrity, cov-security]
