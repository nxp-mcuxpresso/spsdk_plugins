name: Publish To PyPi

on:
  push:
    tags:
      - 'v*'

jobs:
  get-packages:
    name: Get Package List
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.get-packages.outputs.packages }}
      compiled_packages: ${{ steps.get-packages.outputs.compiled_packages }}
      pure_python_packages: ${{ steps.get-packages.outputs.pure_python_packages }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install TOML parser
        run: pip install toml
          
      - id: get-packages
        run: |
          python -c "
          import toml, json
          config = toml.load('pyproject.toml')['tool']['release-tools']
          all_packages = config['sub_projects']
          compiled = ['pqc']
          pure = [p for p in all_packages if p not in compiled]
          print(f'packages={json.dumps(all_packages)}')
          print(f'pure_python_packages={json.dumps(pure)}')
          print(f'compiled_packages={json.dumps(compiled)}')
          " >> $GITHUB_OUTPUT

  build_sdist:
    name: Build Packages
    needs: [get-packages]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
    strategy:
      matrix:
        package: ${{fromJson(needs.get-packages.outputs.packages)}}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build and Check Package
        #uses: hynek/build-and-inspect-python-package@v2.12.0 Use forked package with Python 3.13 as some of our dependencies can not be built with Python 3.14
        uses: BohdanMarek/build-and-inspect-python-package@2ddd2fd011405ab6e7d6d04f4becbe80547ca68d
        with:
          path: ${{ matrix.package }}
          attest-build-provenance-github: 'true'
          upload-name-suffix: -${{ matrix.package }}
          skip-wheel: 'true'

  deploy_sdist:
    name: Upload Releases To PyPI
    needs: [get-packages, build_sdist]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/
    permissions:
      id-token: write
    strategy:
      matrix:
        package: ${{fromJson(needs.get-packages.outputs.packages)}}
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Download Package
        uses: actions/download-artifact@v4.3.0
        with:
          name: Packages-${{ matrix.package }}
          path: dist

      - name: Publish packages to PyPI
        uses: pypa/gh-action-pypi-publish@v1.13.0
        with:
          skip-existing: true

  build_pure_wheels:
    name: Build Pure Python Wheels
    runs-on: ubuntu-latest
    needs: [get-packages]
    permissions:
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        # All packages except pqc (which has C extensions)
        package: ${{fromJson(needs.get-packages.outputs.pure_python_packages)}}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build

      - name: Build universal wheel
        run: python -m build --wheel --outdir dist  ${{ matrix.package }}

      - name: Upload wheels
        uses: actions/upload-artifact@v4.6.2
        with:
          name: wheels-${{ matrix.package }}
          path: dist/*.whl
          overwrite: true

  build_compiled_wheels:
    name: Wheel ${{ matrix.package}} on ${{ matrix.os}}
    runs-on: ${{ matrix.os }}
    needs: [get-packages]
    strategy:
      fail-fast: false
      matrix:
        os: [macos-13, macos-14, ubuntu-latest, windows-latest]
        package: ${{fromJson(needs.get-packages.outputs.compiled_packages)}}
    environment:
      name: pypi
      url: https://pypi.org/
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        name: Install Python
        with:
          python-version: '3.x'

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.23.3
        with:
          package-dir: ${{ matrix.package }}
          output-dir: dist
        env:
          CIBW_SKIP: "pp*"

      - name: Publish packages to GH
        uses: actions/upload-artifact@v4.6.2
        with:
          name: wheels-${{ matrix.package }}-${{ matrix.os }} # this is a "artifact already exists" workaround
          path: dist/*.whl
          overwrite: true


  deploy_wheels:
    name: Deploy Wheels to PyPI
    needs: [build_compiled_wheels, build_pure_wheels]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Create dist directory
        run: mkdir -p dist
      
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Publish wheels to PyPI
        uses: pypa/gh-action-pypi-publish@v1.13.0 # v1.12.4 is needed to support metadata v2.4 including PEP 639
        with:
          skip-existing: true
          packages-dir: dist
